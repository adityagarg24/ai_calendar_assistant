<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Calendar Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🤖 AI Calendar Assistant</h1>
            <div class="info">
                <div class="date">📅 Today: {{ today }}</div>
                <div class="email" id="calendarEmail">📧 Calendar: {{ email }}</div>
                <div class="mock-data-link" id="mockDataLink" style="display: none;">
                    <a href="#" id="showMockDataLink">📋 View mock data</a>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="mode-selector">
                <div class="mode-toggle">
                    <div class="mode-option">
                        <button id="demoModeBtn" class="mode-btn active">📋 Demo Mode</button>
                        <small class="mode-description">Uses mock data</small>
                    </div>
                    <div class="mode-option">
                        <button id="liveModeBtn" class="mode-btn">🔗 Live Calendar</button>
                        <small class="mode-description">Uses integrated Gmail</small>
                    </div>
                </div>
                
                <div class="analysis-selector">
                    <div class="analysis-toggle-container">
                        <span class="toggle-label">📊 Rule-based</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="analysisToggle" class="toggle-input">
                            <label for="analysisToggle" class="toggle-slider"></label>
                        </div>
                        <span class="toggle-label">🤖 Use AI</span>
                    </div>
                    <div class="api-key-section" id="apiKeySection" style="display: none;">
                        <input type="password" id="claudeApiKey" placeholder="Enter Claude API Key for AI analysis" class="api-key-input">
                        <small>🔑 Required for AI-powered insights</small>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <button id="getSummaryBtn" class="summary-btn">
                    <span class="btn-text">Get Today's Summary</span>
                    <span class="btn-loading" style="display: none;">Analyzing...</span>
                </button>
            </div>

            <div id="mockCalendarData" class="mock-calendar-data" style="display: none;">
                <!-- Mock calendar events will be displayed here -->
            </div>

            <div id="results" class="results" style="display: none;">
                <!-- Results will be populated here -->
            </div>

            <div id="error" class="error" style="display: none;">
                <!-- Error messages will be shown here -->
            </div>
        </main>
    </div>

    <script>
        let currentMode = 'demo'; // Default to demo mode
        let currentAnalysis = 'rule-based'; // Default to rule-based

        // Mode toggle functionality
        document.getElementById('demoModeBtn').addEventListener('click', function() {
            currentMode = 'demo';
            document.getElementById('demoModeBtn').classList.add('active');
            document.getElementById('liveModeBtn').classList.remove('active');
            document.getElementById('mockDataLink').style.display = 'block';
            
            // Update calendar text
            document.getElementById('calendarEmail').textContent = '📧 Calendar: Demo data';
            
            // Clear results when switching modes
            clearResults();
        });

        document.getElementById('liveModeBtn').addEventListener('click', function() {
            currentMode = 'live';
            document.getElementById('liveModeBtn').classList.add('active');
            document.getElementById('demoModeBtn').classList.remove('active');
            document.getElementById('mockDataLink').style.display = 'none';
            document.getElementById('mockCalendarData').style.display = 'none';
            
            // Update calendar text back to original
            document.getElementById('calendarEmail').textContent = '📧 Calendar: {{ email }}';
            
            // Clear results when switching modes
            clearResults();
        });

        // Analysis toggle functionality (toggle switch)
        document.getElementById('analysisToggle').addEventListener('change', function() {
            if (this.checked) {
                currentAnalysis = 'ai';
                document.getElementById('apiKeySection').style.display = 'block';
            } else {
                currentAnalysis = 'rule-based';
                document.getElementById('apiKeySection').style.display = 'none';
            }
        });

        // Mock calendar data functionality (header link)
        document.getElementById('showMockDataLink').addEventListener('click', function(e) {
            e.preventDefault();
            const mockDataDiv = document.getElementById('mockCalendarData');
            if (mockDataDiv.style.display === 'none' || mockDataDiv.style.display === '') {
                showMockCalendarData();
                this.textContent = '📋 Hide mock data';
            } else {
                mockDataDiv.style.display = 'none';
                this.textContent = '📋 View mock data';
            }
        });

        // Initialize default states on page load
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('mockDataLink').style.display = 'block';
            document.getElementById('apiKeySection').style.display = 'none'; // Hidden by default (rule-based)
            document.getElementById('analysisToggle').checked = false; // Default to rule-based
            
            // Set initial calendar text for demo mode
            document.getElementById('calendarEmail').textContent = '📧 Calendar: Demo data';
        });

        function clearResults() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';
        }

        function showMockCalendarData() {
            const mockDataDiv = document.getElementById('mockCalendarData');
            mockDataDiv.innerHTML = `
                <h3>📅 Sample Calendar Events for Today (9 meetings)</h3>
                <div class="mock-event">
                    <div class="mock-event-title">Daily Standup</div>
                    <div class="mock-event-time">⏰ 9:00 AM - 9:15 AM</div>
                    <div class="mock-event-description">Daily team sync - Share progress, blockers, and today's plans</div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Client Demo - Syncup</div>
                    <div class="mock-event-time">⏰ 10:30 AM - 11:30 AM</div>
                    <div class="mock-event-description">Product demonstration for Syncup client. Showcase new features</div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Sprint Planning Sprint 4</div>
                    <div class="mock-event-time">⏰ 11:00 AM - 12:30 PM</div>
                    <div class="mock-event-description">Sprint 4 planning session. Review backlog, estimate user stories</div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Catch up call</div>
                    <div class="mock-event-time">⏰ 1:00 PM - 1:30 PM</div>
                    <div class="mock-event-description"></div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Weekly Team Sync</div>
                    <div class="mock-event-time">⏰ 2:00 PM - 3:00 PM</div>
                    <div class="mock-event-description">Weekly team alignment meeting. Discuss sprint progress</div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Lunch</div>
                    <div class="mock-event-time">⏰ 12:30 PM - 1:00 PM</div>
                    <div class="mock-event-description"></div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Quick sync with ABC</div>
                    <div class="mock-event-time">⏰ 3:00 PM - 3:30 PM</div>
                    <div class="mock-event-description"></div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Product Demo Meeting</div>
                    <div class="mock-event-time">⏰ 4:00 PM - 5:00 PM</div>
                    <div class="mock-event-description">Internal product demo and feature discussion</div>
                </div>
                <div class="mock-event">
                    <div class="mock-event-title">Team coffee chat</div>
                    <div class="mock-event-time">⏰ 5:30 PM - 6:00 PM</div>
                    <div class="mock-event-description"></div>
                </div>
            `;
            mockDataDiv.style.display = 'block';
        }

        document.getElementById('getSummaryBtn').addEventListener('click', function() {
            const btn = this;
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');
            const results = document.getElementById('results');
            const error = document.getElementById('error');

            // Show loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            results.style.display = 'none';
            error.style.display = 'none';

            // Build API URL based on mode and analysis type
            let apiUrl = '/get_summary';
            const params = new URLSearchParams();
            
            if (currentMode === 'demo') {
                params.append('demo', 'true');
                
                // Only send API key if AI analysis is selected
                if (currentAnalysis === 'ai') {
                    const claudeKey = document.getElementById('claudeApiKey').value.trim();
                    if (claudeKey) {
                        params.append('claude_key', claudeKey);
                    } else {
                        showError('Please enter a Claude API key for AI analysis, or switch to Rule-based mode.');
                        btn.disabled = false;
                        btnText.style.display = 'inline';
                        btnLoading.style.display = 'none';
                        return;
                    }
                }
            } else {
                // Live mode - check if AI is selected and require API key
                if (currentAnalysis === 'ai') {
                    const claudeKey = document.getElementById('claudeApiKey').value.trim();
                    if (claudeKey) {
                        params.append('claude_key', claudeKey);
                    } else {
                        showError('Please enter a Claude API key for AI analysis, or switch to Rule-based mode.');
                        btn.disabled = false;
                        btnText.style.display = 'inline';
                        btnLoading.style.display = 'none';
                        return;
                    }
                }
            }
            
            if (params.toString()) {
                apiUrl += '?' + params.toString();
            }

            // Make API call
            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.error) {
                        showError(data.message);
                    } else {
                        showResults(data);
                    }
                })
                .catch(err => {
                    console.error('API Error:', err);
                    if (err.message.includes('HTTP')) {
                        showError(`Server error: ${err.message}. Please try again.`);
                    } else if (err.name === 'TypeError' && err.message.includes('fetch')) {
                        showError('Network error: Please check your internet connection and try again.');
                    } else {
                        showError(`Error: ${err.message}. Please try again.`);
                    }
                })
                .finally(() => {
                    // Reset button state
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                });
        });

        function showError(message) {
            const error = document.getElementById('error');
            error.innerHTML = `
                <div class="error-content">
                    <h3>⚠️ Error</h3>
                    <p>${message}</p>
                </div>
            `;
            error.style.display = 'block';
        }

        function showResults(data) {
            const results = document.getElementById('results');
            
            if (data.message) {
                // No meetings case
                results.innerHTML = `
                    <div class="no-meetings">
                        <h2>${data.message}</h2>
                    </div>
                `;
            } else {
                // Show full results
                results.innerHTML = `
                    <div class="summary-section">
                        <h2>📊 Daily Summary</h2>
                        <div class="ai-summary">${formatSummaryAsBullets(data.summary)}</div>
                        <div class="ai-badge">Powered by ${data.ai_provider.toUpperCase()}</div>
                    </div>

                    <div class="stats-section">
                        <h3>📈 Snapshot</h3>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-number">${data.stats.total}</span>
                                <span class="stat-label">Total Meetings</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-number">${data.stats.hours}</span>
                                <span class="stat-label">Hours</span>
                            </div>
                        </div>
                    </div>

                    <div class="meeting-types-section">
                        <div class="meeting-type-row">
                            <div class="meeting-type-card">
                                <h3>🆕 New Meetings</h3>
                                <div class="meeting-count">${data.stats.new}</div>
                                ${data.events.new && data.events.new.length > 0 ? renderEventListWithFlags(data.events.new, data.events.without_agenda, data.overlapping_meetings) : '<p class="no-meetings-text">No new meetings</p>'}
                            </div>
                            <div class="meeting-type-card">
                                <h3>🔄 Recurring Meetings</h3>
                                <div class="meeting-count">${data.stats.recurring}</div>
                                ${data.events.recurring && data.events.recurring.length > 0 ? renderEventListWithFlags(data.events.recurring, data.events.without_agenda, data.overlapping_meetings) : '<p class="no-meetings-text">No recurring meetings</p>'}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            results.style.display = 'block';
        }

        function formatSummaryAsBullets(summary) {
            // Check if summary is a string, if not convert it
            if (typeof summary !== 'string') {
                console.warn('Summary is not a string:', summary);
                summary = String(summary || 'No summary available');
            }
            
            // If summary already contains bullet points, handle newlines properly
            if (summary.includes('•')) {
                // Replace \n with <br> for proper HTML line breaks
                return summary.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
            }
            
            // Convert summary to bullet points without truncation
            const sentences = summary.split(/[.!?]+/).filter(s => s.trim().length > 0);
            const bullets = sentences.map(sentence => {
                const trimmed = sentence.trim();
                // Don't truncate - keep full sentence
                return `• ${trimmed}`;
            }).join('<br>');
            return bullets;
        }

        function renderEventListWithFlags(events, withoutAgendaEvents, overlappingMeetings) {
            // Create lookup sets for quick checking
            const withoutAgendaIds = new Set((withoutAgendaEvents || []).map(e => e.id || e.title));
            const overlappingIds = new Set();
            
            // Process overlapping meetings if provided
            if (overlappingMeetings && overlappingMeetings.length > 0) {
                overlappingMeetings.forEach(group => {
                    group.forEach(meeting => {
                        overlappingIds.add(meeting.id || meeting.title);
                    });
                });
            }
            
            // Sort events by start time
            const sortedEvents = [...events].sort((a, b) => {
                // Convert time strings to comparable format
                const timeA = convertTimeToMinutes(a.start_time);
                const timeB = convertTimeToMinutes(b.start_time);
                return timeA - timeB;
            });
            
            return sortedEvents.map(event => {
                const eventId = event.id || event.title;
                const hasNoAgenda = withoutAgendaIds.has(eventId);
                const isOverlapping = overlappingIds.has(eventId);
                
                // Build CSS classes
                let cssClasses = 'event-item';
                if (isOverlapping) {
                    cssClasses += ' event-overlapping';
                }
                
                return `
                    <div class="${cssClasses}" data-event-id="${eventId}">
                        <div class="event-title">
                            ${event.title}
                            ${hasNoAgenda ? `
                                <span class="no-agenda-badge">No Agenda</span>
                                <button class="request-agenda-btn" onclick="requestAgenda('${eventId}', '${event.title}', '${event.start_time}', '${event.end_time}', ${event.attendees || 0})">
                                    Request agenda
                                </button>
                            ` : ''}
                        </div>
                        <div class="event-time">⏰ ${event.start_time} - ${event.end_time}</div>
                        ${event.description ? `<div class="event-description">📋 ${event.description}</div>` : ''}
                        <div class="email-tooltip" id="tooltip-${eventId}" style="display: none;">
                            <div class="tooltip-content">
                                <div class="tooltip-header">
                                    <span>📧 Email Draft</span>
                                    <button class="tooltip-close" onclick="closeTooltip('${eventId}')">✕</button>
                                </div>
                                <div class="email-draft" id="draft-${eventId}">
                                    <div class="loading">Generating email...</div>
                                </div>
                                <div class="tooltip-actions">
                                    <button class="copy-btn" onclick="copyToClipboard('${eventId}')">📋 Copy</button>
                                    <button class="cancel-btn" onclick="closeTooltip('${eventId}')">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function convertTimeToMinutes(timeStr) {
            // Convert "9:00 AM" or "10:30 PM" to minutes since midnight
            const [time, period] = timeStr.split(' ');
            const [hours, minutes] = time.split(':').map(Number);
            
            let totalMinutes = (hours % 12) * 60 + minutes;
            if (period === 'PM') {
                totalMinutes += 12 * 60;
            }
            
            return totalMinutes;
        }

        // Email drafting functions
        function requestAgenda(eventId, title, startTime, endTime, attendees) {
            const tooltip = document.getElementById(`tooltip-${eventId}`);
            const draftDiv = document.getElementById(`draft-${eventId}`);
            
            // Show tooltip
            tooltip.style.display = 'block';
            
            // Show loading
            draftDiv.innerHTML = '<div class="loading">Generating email...</div>';
            
            // Build API request
            const params = new URLSearchParams({
                event_id: eventId,
                title: title,
                start_time: startTime,
                end_time: endTime,
                attendees: attendees,
                mode: currentAnalysis
            });
            
            // Add Claude key if in AI mode
            if (currentAnalysis === 'ai') {
                const claudeKey = document.getElementById('claudeApiKey').value.trim();
                if (claudeKey) {
                    params.append('claude_key', claudeKey);
                } else {
                    draftDiv.innerHTML = '<div class="error">Please enter Claude API key for AI mode</div>';
                    return;
                }
            }
            
            // Make API call
            fetch(`/draft_email?${params.toString()}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        draftDiv.innerHTML = `<div class="error">${data.message}</div>`;
                    } else {
                        draftDiv.innerHTML = `<div class="email-text">${data.email_draft}</div>`;
                    }
                })
                .catch(err => {
                    console.error('Email draft error:', err);
                    draftDiv.innerHTML = '<div class="error">Failed to generate email. Please try again.</div>';
                });
        }
        
        function closeTooltip(eventId) {
            const tooltip = document.getElementById(`tooltip-${eventId}`);
            tooltip.style.display = 'none';
        }
        
        function copyToClipboard(eventId) {
            const draftDiv = document.getElementById(`draft-${eventId}`);
            const emailText = draftDiv.querySelector('.email-text');
            
            if (emailText) {
                const text = emailText.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    // Show feedback
                    const copyBtn = document.querySelector(`#tooltip-${eventId} .copy-btn`);
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                    }, 2000);
                }).catch(err => {
                    console.error('Copy failed:', err);
                    alert('Failed to copy to clipboard');
                });
            }
        }

        function renderEventList(events) {
            return events.map(event => `
                <div class="event-item">
                    <div class="event-title">${event.title}</div>
                    <div class="event-time">⏰ ${event.start_time} - ${event.end_time}</div>
                    ${event.description ? `<div class="event-description">📋 ${event.description}</div>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
